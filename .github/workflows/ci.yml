name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Make Plutus build script executable
        run: chmod +x ./src/Chrysalis.Plutus/build-rs.sh

      - name: Show .NET version
        run: dotnet --version

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --no-restore --verify-no-changes

      - name: Build
        run: dotnet build --no-restore -warnaserror

      - name: Test
        run: dotnet test --no-build --filter "Category!=Integration"

      - name: Debug NuGet API key
        run: |
          KEY="${{ secrets.NUGET_API_KEY }}"
          echo "Key length: ${#KEY}"
          echo "Key sha256: $(echo -n "$KEY" | sha256sum | cut -c1-16)"

      - name: Pack (dry run)
        run: |
          mkdir -p out
          dotnet pack ./src/Chrysalis.Cbor.CodeGen/Chrysalis.Cbor.CodeGen.csproj -c Release -o out
          dotnet pack ./src/Chrysalis.Cbor/Chrysalis.Cbor.csproj -c Release -o out
          dotnet pack ./src/Chrysalis.Crypto/Chrysalis.Crypto.csproj -c Release -o out
          dotnet pack ./src/Chrysalis.Wallet/Chrysalis.Wallet.csproj -c Release -o out
          dotnet pack ./src/Chrysalis.Network/Chrysalis.Network.csproj -c Release -o out
          dotnet pack ./src/Chrysalis.Plutus/Chrysalis.Plutus.csproj -c Release -o out
          dotnet pack ./src/Chrysalis.Tx/Chrysalis.Tx.csproj -c Release -o out
          dotnet pack ./src/Chrysalis/Chrysalis.csproj -c Release -o out
          echo "Packed $(ls out/*.nupkg | wc -l) packages:"
          ls -la out/*.nupkg
