name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Show .NET version
        run: dotnet --version

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --filter "Category!=Integration"

      - name: Pack packages
        run: |
          mkdir -p out
          for proj in src/Chrysalis*/Chrysalis*.csproj; do
            if grep -q '<IsPackable>false</IsPackable>' "$proj" 2>/dev/null || \
               grep -q '<IsTestProject>true</IsTestProject>' "$proj" 2>/dev/null || \
               echo "$proj" | grep -qi "cli"; then
              continue
            fi
            echo "Packing $proj..."
            dotnet pack "$proj" -c Release -o out -p:Version=${{ steps.version.outputs.version }}
          done

      - name: Push to NuGet
        run: dotnet nuget push ./out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
