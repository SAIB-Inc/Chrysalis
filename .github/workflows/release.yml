name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Show .NET version
        run: dotnet --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Make Plutus build script executable
        run: chmod +x ./src/Chrysalis.Plutus/build-rs.sh

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --filter "Category!=Integration"

      - name: Pack packages
        run: |
          mkdir -p out
          dotnet pack ./src/Chrysalis.Codec.CodeGen/Chrysalis.Codec.CodeGen.csproj -c Release -o out -p:Version=${{ steps.version.outputs.version }}
          dotnet pack ./src/Chrysalis.Codec/Chrysalis.Codec.csproj -c Release -o out -p:Version=${{ steps.version.outputs.version }}
          dotnet pack ./src/Chrysalis.Crypto/Chrysalis.Crypto.csproj -c Release -o out -p:Version=${{ steps.version.outputs.version }}
          dotnet pack ./src/Chrysalis.Wallet/Chrysalis.Wallet.csproj -c Release -o out -p:Version=${{ steps.version.outputs.version }}
          dotnet pack ./src/Chrysalis.Network/Chrysalis.Network.csproj -c Release -o out -p:Version=${{ steps.version.outputs.version }}
          dotnet pack ./src/Chrysalis.Plutus/Chrysalis.Plutus.csproj -c Release -o out -p:Version=${{ steps.version.outputs.version }}
          dotnet pack ./src/Chrysalis.Tx/Chrysalis.Tx.csproj -c Release -o out -p:Version=${{ steps.version.outputs.version }}
          dotnet pack ./src/Chrysalis/Chrysalis.csproj -c Release -o out -p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet
        run: dotnet nuget push ./out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
